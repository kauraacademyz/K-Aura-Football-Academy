async function loadAtt(){if(document.getElementById('attTeam'))CT=document.getElementById('attTeam').value;var dateStr=document.getElementById('attDate').value;var dayStr=dateStr.split('-')[2];var monthStr=dateStr.substring(0,7);var docId=monthStr+'_'+CT;var girls=tp(CT);attState={};girls.forEach(p=>{attState[p.id]='none';});var docData=await loadAttDb(docId);if(docData[dayStr]){var dayAtt=docData[dayStr];for(var pid in dayAtt){if(attState.hasOwnProperty(pid))attState[pid]=dayAtt[pid];}}renderAttList();}

async function calcAtt(){var dateStr=document.getElementById('attDate').value;var monthStr=dateStr.substring(0,7);var docId=monthStr+'_'+CT;try{var doc=await db.collection('attendance').doc(docId).get();if(!doc.exists)return;var monthData=doc.data();var playerCounts={};var totalDaysRecorded=0;for(var day in monthData){if(monthData.hasOwnProperty(day)&&day!=='lastUpdated'){totalDaysRecorded++;var dayAtt=monthData[day];for(var pid in dayAtt){if(!playerCounts[pid])playerCounts[pid]={present:0};if(dayAtt[pid]==='present')playerCounts[pid].present++;}}}if(totalDaysRecorded===0)return;tp(CT).forEach(p=>{if(playerCounts[p.id]){var per=Math.round((playerCounts[p.id].present/totalDaysRecorded)*100);var st=p.monthlyStats.find(s=>s.month===monthStr);if(st){st.attendance=per;}else{p.monthlyStats.push({month:monthStr,attendance:per,rating:0,matches:0,goals:0,assists:0,passAccuracy:0,shootingAccuracy:0,speed:0,discipline:0});}}});await sv();toast(t('calcOk'));}catch(e){toast("Error",false);}}

function calcOver(){var g=parseInt(document.getElementById('qsGoals').value)||0,a=parseInt(document.getElementById('qsAssists').value)||0,pa=parseInt(document.getElementById('qsPass').value)||0,sa=parseInt(document.getElementById('qsShoot').value)||0,att=parseInt(document.getElementById('qsAtt').value)||0,spd=parseInt(document.getElementById('qsSpd').value)||0,disc=parseInt(document.getElementById('qsDisc').value)||0,cc=parseInt(document.getElementById('stChanceConv').value)||0,ccr=parseInt(document.getElementById('stChanceCreate').value)||0,cr=parseInt(document.getElementById('stCrosses').value)||0,tk=parseInt(document.getElementById('stTackles').value)||0,intc=parseInt(document.getElementById('stInterceptions').value)||0,clr=parseInt(document.getElementById('stClearances').value)||0,rec=parseInt(document.getElementById('stRecovery').value)||0,aer=parseInt(document.getElementById('stAerials').value)||0,yc=parseInt(document.getElementById('stYellow').value)||0,rc=parseInt(document.getElementById('stRed').value)||0,fw=parseInt(document.getElementById('stFoulsW').value)||0,fit=parseInt(document.getElementById('stFitness').value)||0,str=parseInt(document.getElementById('stStrength').value)||0,vis=parseInt(document.getElementById('stVision').value)||0,int=parseInt(document.getElementById('stIntel').value)||0,tac=parseInt(document.getElementById('stTact').value)||0;var attack=(g*5+a*3+sa+cc)/4,playmaking=(pa+ccr+cr)/3,defending=(tk+intc+clr+rec+aer)/5,mental=(vis*10+int*10+tac*10+disc+fw)/5,physical=(fit*10+str*10+spd)/3,penalty=(yc*2+rc*5);var overall=Math.min(100,Math.round((attack+playmaking+defending+mental+physical+att)/6)-penalty);if(overall<0)overall=0;document.getElementById('calcRating').textContent=overall;return overall;}

function initDrawing(canvas){if(!canvas)return;var ctx=canvas.getContext('2d');function getPos(e){var rect=canvas.getBoundingClientRect();var clientX=e.clientX||(e.touches&&e.touches[0].clientX);var clientY=e.clientY||(e.touches&&e.touches[0].clientY);return{x:clientX-rect.left,y:clientY-rect.top};}function startDraw(e){e.preventDefault();isDrawing=true;var pos=getPos(e);lastX=pos.x;lastY=pos.y;}function draw(e){if(!isDrawing)return;e.preventDefault();var pos=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(pos.x,pos.y);if(isEraser){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=drawSize*5;}else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;}ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();lastX=pos.x;lastY=pos.y;}function stopDraw(e){if(e)e.preventDefault();isDrawing=false;}canvas.addEventListener('mousedown',startDraw);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',stopDraw);canvas.addEventListener('mouseleave',stopDraw);canvas.addEventListener('touchstart',startDraw,{passive:false});canvas.addEventListener('touchmove',draw,{passive:false});canvas.addEventListener('touchend',stopDraw,{passive:false});}

function renderSlots(){var ps=tp(CT);document.querySelectorAll('.pitch-slot').forEach(slot=>{var pid=slot.getAttribute('data-pid');var pos=slot.getAttribute('data-pos');if(pid){var p=ps.find(x=>x.id===pid);if(p){slot.classList.add('filled');slot.innerHTML=`<span class="player-num text-[11px] font-bold">${p.shirtNum||p.name[0]}</span><div class="pitch-player-name">${p.name} (${p.pos})</div>`;makePlayerDraggable(slot);}}else{slot.classList.remove('filled');slot.innerHTML=`<span class="slot-label">${plb(pos)}</span>`;}});}
function makePlayerDraggable(el){if(!el || el._dragBound) return;el._dragBound = true;var pitch=document.getElementById('tacticsPitch');var rect=null, startX=0, startY=0, moved=false, dragging=false;function getXY(e){if(e.touches && e.touches[0]) return {x:e.touches[0].clientX, y:e.touches[0].clientY};if(e.changedTouches && e.changedTouches[0]) return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};return {x:e.clientX, y:e.clientY};}function onStart(e){pitch = document.getElementById('tacticsPitch'); if(!pitch) return;rect = pitch.getBoundingClientRect();var p = getXY(e); startX = p.x; startY = p.y; moved = false; dragging = true;document.addEventListener('mousemove', onMove, {passive:false});document.addEventListener('mouseup', onEnd, {passive:false});document.addEventListener('touchmove', onMove, {passive:false});document.addEventListener('touchend', onEnd, {passive:false});document.addEventListener('touchcancel', onEnd, {passive:false});}function onMove(e){if(!dragging || !rect) return;var p = getXY(e);if(!moved && Math.abs(p.x-startX) < 4 && Math.abs(p.y-startY) < 4) return;moved = true; e.preventDefault();var x = Math.max(0, Math.min(rect.width, p.x - rect.left));var y = Math.max(0, Math.min(rect.height, p.y - rect.top));el.style.left = (x/rect.width*100) + '%';el.style.top = (y/rect.height*100) + '%';}function onEnd(e){dragging = false;document.removeEventListener('mousemove', onMove);document.removeEventListener('mouseup', onEnd);document.removeEventListener('touchmove', onMove);document.removeEventListener('touchend', onEnd);document.removeEventListener('touchcancel', onEnd);if(moved && e && e.cancelable) e.preventDefault();if(moved){var swallow = function(ev){ ev.stopPropagation(); ev.preventDefault(); el.removeEventListener('click', swallow, true); };el.addEventListener('click', swallow, true);setTimeout(function(){ el.removeEventListener('click', swallow, true); }, 350);}}el.addEventListener('mousedown', onStart);el.addEventListener('touchstart', onStart, {passive:false});}
function vTOTM(){var tm=CT;var h=`<div class="fade-in space-y-4"><div class="flex justify-between items-center gap-3 flex-wrap"><h3 class="fd text-pv-l">${t('totm')}</h3><div class="flex gap-2 items-center flex-wrap">${genderToggleUI()}${teamUI('totmTeam',tm)}<div class="flex gap-1 bg-dk-h p-1 rounded-lg border border-pv/10"><button onclick="setPitchSize('11');nav('totm')" class="px-3 py-1 text-xs rounded ${currentPitchSize==='11'?'bg-pv text-white':'text-gray-400'}">${t('elevenAside')}</button><button onclick="setPitchSize('7');nav('totm')" class="px-3 py-1 text-xs rounded ${currentPitchSize==='7'?'bg-pv text-white':'text-gray-400'}">${t('sevenAside')}</button><button onclick="setPitchSize('5');nav('totm')" class="px-3 py-1 text-xs rounded ${currentPitchSize==='5'?'bg-pv text-white':'text-gray-400'}">${t('fiveAside')}</button></div><select id="totmFormation" class="inp text-xs w-28" onchange="currentFormation=this.value; loadFormationTOTM()">${Object.keys(formations[currentPitchSize]).map(f=>`<option value="${f}" ${f===currentFormation?'selected':''}>${f}</option>`).join('')}</select></div></div><div class="bg-dk-c p-4 rounded-xl border border-pv/10"><h4 class="text-pv-l font-bold text-sm mb-2 border-b border-gray-700 pb-1">${t('distinguished')}</h4><div id="tacticsPitchTOTM" class="pitch-tactic" style="height:400px"></div></div></div>`;setTimeout(loadFormationTOTM,50);return h;}

function loadDayNutritionData(pid){var p=D.players.find(x=>x.id===pid);if(!p||!p.nutrition||!p.nutrition.dietPlan)return;var date=document.getElementById('newNutDate').value;if(!date)return;var day=p.nutrition.dietPlan.find(d=>d.date===date);var prefixes=['bf','ln','dn'];prefixes.forEach(pre=>{document.getElementById(pre+'_time').value='';document.getElementById(pre+'_cal').value='0';document.getElementById(pre+'_pro').value='0';document.getElementById(pre+'_carbs').value='0';document.getElementById(pre+'_fats').value='0';document.getElementById(pre+'_desc').value='';});if(day){document.getElementById('newDayWater').value=day.water||'0';document.getElementById('newDayNotes').value=day.notes||'';var map={'breakfast':'bf','lunch':'ln','dinner':'dn'};(day.meals||[]).forEach(m=>{var pre=map[m.type];if(pre){document.getElementById(pre+'_time').value=m.time||'';document.getElementById(pre+'_cal').value=m.cal||'0';document.getElementById(pre+'_pro').value=m.protein||'0';document.getElementById(pre+'_carbs').value=m.carbs||'0';document.getElementById(pre+'_fats').value=m.fats||'0';document.getElementById(pre+'_desc').value=m.desc||'';}});}else{document.getElementById('newDayWater').value='0';document.getElementById('newDayNotes').value='';}}

p-2"><div>${lbl('un')} (Parent)<input id="apParEmail" type="email" class="inp"></div><div>${lbl('pw')} (Parent)<input id="apParPass" type="password" class="inp" placeholder="Set account password"></div></div><div class="grid grid-cols-2 gap-2"><div>${lbl('parPhone')}<input id="apParPhone" type="tel" class="inp"></div><div>${lbl('playerPhone')}<input id="apPlayerPhone" type="tel" class="inp"></div></div><div class="flex gap-2 mt-3"><button onclick="saveAddPlayer()" class="btn btn-p flex-1">${t('save')}</button><button onclick="hideM()" class="btn btn-s flex-1">${t('cancel')}</button></div></div></div>`);}
function setStarLevel(level){document.getElementById('epStarLevel').value=level;var stars=document.querySelectorAll('#epStarRating .fa-star');stars.forEach((s,i)=>{if(i<level)s.classList.add('active');else s.classList.remove('active');});}
function showEditPlayer(id){var p=D.players.find(x=>x.id===id);if(!p)return;var parentObj=D.parents.find(x=>x.childId===id);var isDisabled=parentObj&&parentObj.disabled;showM(`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${t('editP')}</h2><div class="space-y-2.5"><div class="grid grid-cols-2 gap-2"><div>${lbl('nm')}<input id="epNm" class="inp" value="${p.name}"></div><div>${lbl('nickName')}<input id="epNick" class="inp" value="${p.nickName||''}"></div></div><div class="grid grid-cols-2 gap-2"><div>${lbl('gender')}<select id="epGender" class="inp"><option value="boys" ${p.gender==='boys'?'selected':''}>${t('boys')}</option><option value="girls" ${p.gender==='girls'||!p.gender?'selected':''}>${t('girls')}</option></select></div><div>${lbl('dob')}<input id="epDob" type="date" class="inp" value="${p.dob||''}"></div></div><div class="grid grid-cols-2 gap-2"><div>${lbl('age')}<input id="epAge" type="number" class="inp" value="${p.age||''}"></div><div>${lbl('joinDate')}<input id="epJoin" type="date" class="inp" value="${p.joinDate||''}"></div></div><div class="grid grid-cols-3 gap-2"><div>${lbl('height')}<input id="epHeight" type="number" class="inp" value="${p.height||''}"></div><div>${lbl('weight')}<input id="epWeight" type="number" class="inp" value="${p.weight||''}"></div><div>${lbl('prefFoot')}<select id="epFoot" class="inp"><option value="right" ${p.foot==='right'?'selected':''}>${t('rightF')}</option><option value="left" ${p.foot==='left'?'selected':''}>${t('leftF')}</option><option value="both" ${p.foot==='both'?'selected':''}>${t('bothF')}</option></select></div></div><div class="grid grid-cols-3 gap-2"><div>${lbl('shirtNum')}<input id="epNum" type="number" class="inp" value="${p.shirtNum||''}"></div><div>${lbl('pos')}<select id="epPos" class="inp"><option value="GK" ${p.pos==='GK'?'selected':''}>GK</option><option value="CB" ${p.pos==='CB'?'selected':''}>CB</option><option value="LB" ${p.pos==='LB'?'selected':''}>LB</option><option value="RB" ${p.pos==='RB'?'selected':''}>RB</option><option value="CDM" ${p.pos==='CDM'?'selected':''}>CDM</option><option value="CM" ${p.pos==='CM'?'selected':''}>CM</option><option value="CAM" ${p.pos==='CAM'?'selected':''}>CAM</option><option value="LW" ${p.pos==='LW'?'selected':''}>LW</option><option value="RW" ${p.pos==='RW'?'selected':''}>RW</option><option value="ST" ${p.pos==='ST'?'selected':''}>ST</option></select></div><div>${lbl('team')}<select id="epTeam" class="inp">${D.teams.map(t=>`<option value="${t}" ${t===p.team?'selected':''}>${t}</option>`).join('')}</select></div></div><div>${lbl('photoUrl')}<input id="epPhotoFile" type="file" accept="image/*" class="inp"></div><div class="flex items-center gap-2 mt-2"><label class="text-xs text-gray-400">${t('star')}:</label><div class="star-rating flex gap-1" id="epStarRating">${[1,2,3,4].map(i=>`<i class="fas fa-star ${p.starLevel>=i?'active':''}" onclick="setStarLevel(${i})" style="cursor:pointer;"></i>`).join('')}<i class="fas fa-times text-red-400 ml-2 cursor-pointer" onclick="setStarLevel(0)" title="Clear"></i></div><input type="hidden" id="epStarLevel" value="${p.starLevel||0}"></div><div class="border-t border-pv/10 my-2"></div><h4 class="text-pv-l font-bold text-sm">${t('parentAcc')}</h4><div class="grid grid-cols-3 gap-2"><div>${lbl('un')} (Parent)<input id="epParEmail" type="email" class="inp" value="${p.parentEmail||''}" readonly></div><div>${lbl('parPhone')}<input id="epParPhone" type="tel" class="inp" value="${p.parentPhone||''}"></div><div>${lbl('playerPhone')}<input id="epPlayerPhone" type="tel" class="inp" value="${p.playerPhone||''}"></div></div><div class="flex gap-2 mt-3"><button onclick="saveEditPlayer('${id}')" class="btn btn-p flex-1">${t('save')}</button><button onclick="hideM()" class="btn btn-s flex-1">${t('cancel')}</button></div><div class="border-t border-pv/10 my-2 mt-4"></div><div class="grid grid-cols-2 gap-2"><button onclick="toggleFreezePlayer('${id}')" class="btn ${isDisabled?'btn-p':'btn-s'} text-xs">${isDisabled?'تفعيل الحساب':'تجميد الحساب'}</button><button onclick="deletePlayer('${id}')" class="btn btn-d text-xs">حذف اللاعب نهائياً</button></div></div></div>`);}
async function saveEditPlayer(id){var p=D.players.find(x=>x.id===id);p.name=document.getElementById('epNm').value;p.nickName=document.getElementById('epNick').value;p.gender=document.getElementById('epGender').value;p.dob=document.getElementById('epDob').value;p.age=parseInt(document.getElementById('epAge').value)||0;p.joinDate=document.getElementById('epJoin').value;p.height=document.getElementById('epHeight').value;p.weight=document.getElementById('epWeight').value;p.foot=document.getElementById('epFoot').value;p.shirtNum=parseInt(document.getElementById('epNum').value);p.pos=document.getElementById('epPos').value;p.team=document.getElementById('epTeam').value;p.starLevel=parseInt(document.getElementById('epStarLevel').value)||0;p.isStar=p.starLevel>0;p.parentEmail=document.getElementById('epParEmail').value;p.parentPhone=document.getElementById('epParPhone').value;p.playerPhone=document.getElementById('epPlayerPhone').value;var photoFile=document.getElementById('epPhotoFile').files[1];if(photoFile){document.getElementById('loadingScreen').classList.remove('hidden');try{p.photo=await uploadToCloudinary(photoFile);}catch(e){toast(t('saveErr'),false);document.getElementById('loadingScreen').classList.add('hidden');return;}document.getElementById('loadingScreen').classList.add('hidden');}try{await sv();toast(t('upOk'));hideM();nav('players');}catch(e){toast(t('saveErr'),false);}}
async function toggleFreezePlayer(pid){var parentObj=D.parents.find(x=>x.childId===pid);if(parentObj){parentObj.disabled=!parentObj.disabled;await sv();toast(parentObj.disabled?'تم تجميد الحساب':'تم تفعيل الحساب',true);hideM();nav('players');}}
async function deletePlayer(pid){if(confirm('هل أنت متأكد من حذف هذا اللاعب؟ لا يمكن التراجع.')){D.players=D.players.filter(x=>x.id!==pid);D.parents=D.parents.filter(x=>x.childId!==pid);await sv();toast('تم حذف اللاعب',true);hideM();nav('players');}}
function vStoreAdmin(){var h=`<div class="fade-in space-y-4"><div class="flex justify-between items-center flex-wrap gap-2"><h3 class="fd text-pv-l">${t('manageStore')}</h3><div class="flex gap-2 flex-wrap"><button onclick="toggleStoreStatus()" class="btn ${D.storeOpen?'btn-d':'btn-p'} text-xs">${D.storeOpen?t('closeStore'):t('openStore')}</button><button onclick="showAddProduct()" class="btn btn-p text-xs"><i class="fas fa-plus mr-1"></i>${t('addProduct')}</button><button onclick="showBranches()" class="btn btn-s text-xs"><i class="fas fa-map-marker-alt mr-1"></i>${t('manageBranches')}</button><button onclick="showDeliveryAreas()" class="btn btn-s text-xs"><i class="fas fa-truck mr-1"></i>${t('manageDelivery')}</button><button onclick="showStoreOrders()" class="btn btn-s text-xs"><i class="fas fa-list mr-1"></i>${t('storeOrders')}</button></div></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;D.storeProducts.forEach(p=>{var img=p.images&&p.images[0]?p.images[0]:'https://via.placeholder.com/150';h+=`<div class="store-card rounded-xl overflow-hidden"><img src="${img}" class="w-full h-40 object-cover"><div class="p-3"><h4 class="font-bold text-pv-l truncate">${p.name}</h4><p class="text-pv font-bold text-lg">${p.price} ${t('curr')}</p><p class="text-xs text-gray-400">${t('quantity')}: ${p.quantity} | ${t('depositAmount')}: ${p.depositAmount||0} ${t('curr')}</p><div class="flex gap-1 mt-2"><button onclick="showAddProduct('${p.id}')" class="btn btn-s text-xs flex-1"><i class="fas fa-edit"></i></button><button onclick="deleteProduct('${p.id}')" class="btn btn-d text-xs flex-1"><i class="fas fa-trash"></i></button></div></div></div>`;});h+=`</div></div>`;return h;}
function vStorePublic(){if(!D.storeOpen)return `<div class="fade-in flex flex-col items-center justify-center h-full min-h-[60vh] text-center"><i class="fas fa-store-slash text-6xl text-red-400 mb-6"></i><h2 class="fd text-4xl text-red-400 font-black mb-4">${t('storeClosed')}</h2><p class="text-gray-400 text-lg">${t('comingSoon')}</p></div>`;var h=`<div class="fade-in space-y-4"><h3 class="fd text-pv-l">${t('store')}</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">`;D.storeProducts.forEach(p=>{var img=p.images&&p.images[0]?p.images[0]:'https://via.placeholder.com/150';var isOut=p.quantity<=0;h+=`<div class="store-card rounded-xl overflow-hidden flex flex-col"><img src="${img}" class="w-full h-40 object-cover cursor-pointer" onclick="showProductModal('${p.id}')"><div class="p-3 flex-1 flex flex-col"><h4 class="font-bold text-pv-l truncate">${p.name}</h4><p class="text-gray-400 text-xs flex-1 line-clamp-2 mb-2">${p.desc||''}</p><div class="flex justify-between items-center mt-auto"><span class="text-pv font-bold text-lg">${p.price} ${t('curr')}</span>${isOut?`<span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded">${t('soldOut')}</span>`:`<button onclick="showProductModal('${p.id}')" class="btn btn-p text-xs">${t('buyNow')}</button>`}</div></div></div>`;});h+=`</div></div>`;return h;}
function showProductModal(id){var p=D.storeProducts.find(x=>x.id===id);if(!p)return;storeGalleryIdx=0;var sizesHtml=(p.sizes||[]).map(s=>`<button class="size-btn btn btn-s text-xs" data-size="${s}" onclick="selectSize(this)">${s}</button>`).join('');showM(`<div class="p-5"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="relative"><img id="prodMainImg" src="${p.images[0]||''}" class="w-full h-64 object-cover rounded-lg">${p.images.length>1?`<button onclick="changeProdImg(-1,'${p.id}')" class="absolute left-2 top-1/2 bg-black/50 p-2 rounded-full text-white"><i class="fas fa-chevron-left"></i></button><button onclick="changeProdImg(1,'${p.id}')" class="absolute right-2 top-1/2 bg-black/50 p-2 rounded-full text-white"><i class="fas fa-chevron-right"></i></button>`:''}</div><div><h2 class="fd text-2xl text-pv-l">${p.name}</h2><p class="text-gray-400 mt-2 text-sm">${p.desc||''}</p><p class="text-pv font-bold text-xl mt-3">${p.price} ${t('curr')}</p><p class="text-xs text-gray-400 mt-1">${t('depositAmount')}: ${p.depositAmount||0} ${t('curr')}</p>${sizesHtml?`<div class="mt-3"><label class="text-xs text-gray-400 block mb-1">${t('sizes')}</label><div class="flex gap-2 flex-wrap">${sizesHtml}</div></div>`:''}<div class="mt-3"><label class="text-xs text-gray-400 block mb-1">${t('quantity')}</label><input type="number" id="prodQty" class="inp w-24" min="1" max="${p.quantity}" value="1" ${p.quantity<=0?'disabled':''}></div><button onclick="showCheckoutModal('${p.id}', document.getElementById('prodQty').value, (document.querySelector('.size-btn.active') ? document.querySelector('.size-btn.active').getAttribute('data-size') : ''))" class="btn btn-p w-full mt-4" ${p.quantity<=0?'disabled':''}>${p.quantity>0?t('buyNow'):t('soldOut')}</button></div></div></div>`);}
function changeProdImg(dir,id){var p=D.storeProducts.find(x=>x.id===id);if(!p||p.images.length<=1)return;storeGalleryIdx+=dir;if(storeGalleryIdx<0)storeGalleryIdx=p.images.length-1;if(storeGalleryIdx>=p.images.length)storeGalleryIdx=0;document.getElementById('prodMainImg').src=p.images[storeGalleryIdx];} function selectSize(btn){document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function showCheckoutModal(id, qty, size){var p=D.storeProducts.find(x=>x.id===id);if(!p)return;var branchesHtml=D.storeSettings.branches.map(b=>`<option>${b}</option>`).join('');var areasHtml=D.storeSettings.deliveryAreas.map(a=>`<option value="${a.name}" data-fee="${a.fee}">${a.name} (${a.fee} ${t('curr')})</option>`).join('');var instaHtml='';if(D.social.instapay||D.social.instapayNumber){instaHtml=`<label class="flex items-center gap-2 mt-2 cursor-pointer"><input type="radio" name="payOpt" value="instapay" onchange="togglePayMethod()"> ${t('instapay')} (Full Amount)</label>`;}showM(`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${t('checkout')}</h2><div class="space-y-2"><div>${lbl('fullName')}<input id="coName" class="inp"></div><div>${lbl('phone')}<input id="coPhone" type="tel" class="inp"></div><div class="flex gap-2"><label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="delOpt" value="delivery" onchange="toggleDelFields()" checked> ${t('deliveryOpt')}</label><label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="delOpt" value="pickup" onchange="toggleDelFields()"> ${t('pickupOpt')}</label></div><div id="addrField"><div class="mb-2">${lbl('selectArea')}<select id="coArea" class="inp" onchange="updateCheckoutTotal()">${areasHtml}</select></div><div><label class="text-[11px] text-gray-400 mb-0.5 block">العنوان بالتفصيل</label><textarea id="coAddrDetails" class="inp" rows="2" placeholder="شارع، مبنى، دور، شقة..."></textarea></div></div><div id="branchField" class="hidden">${lbl('selectBranch')}<select id="coBranch" class="inp">${branchesHtml}</select></div><div class="mt-2"><label class="text-xs text-gray-400 block mb-1">${t('paymentMethod')}</label><label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="payOpt" value="cash" onchange="togglePayMethod()" checked> ${t('cash')} (Deposit ${p.depositAmount||0} ${t('curr')})</label>${instaHtml}</div><div id="instaPayField" class="hidden mt-2 p-2 bg-dk-h rounded text-xs">${D.social.instapay?`<a href="${D.social.instapay}" target="_blank" class="text-blue-400 underline block">InstaPay Link</a>`:''}${D.social.instapayNumber?`<p class="mt-1">InstaPay Number: <span class="font-bold text-white" onclick="navigator.clipboard.writeText('${D.social.instapayNumber}');toast('Copied',true)">${D.social.instapayNumber}</span> (Click to copy)</p>`:''}</div><div id="depositMsg" class="text-xs text-yellow-400 mt-2 p-2 bg-yellow-500/10 rounded">Please transfer deposit of ${p.depositAmount||0} ${t('curr')} via InstaPay and upload receipt below.</div><div class="mt-2"><label class="text-xs text-gray-400 block mb-1">${t('uploadReceipt')} *</label><input id="coReceipt" type="file" accept="image/*" class="inp" required></div><div class="mt-3 bg-dk-h p-3 rounded text-sm"><div class="flex justify-between"><span class="text-gray-400">Product Total:</span> <span id="coProdTotal" class="font-bold text-white" data-price="${p.price}">${p.price} ${t('curr')}</span></div><div class="flex justify-between mt-1"><span class="text-gray-400">Delivery Fee:</span> <span id="coDelTotal" class="font-bold text-white">0 ${t('curr')}</span></div><div class="flex justify-between mt-1 border-t border-gray-700 pt-1"><span class="text-pv-l">Grand Total:</span> <span id="coGrandTotal" class="font-bold text-pv-l">${p.price} ${t('curr')}</span></div></div><div class="flex gap-2 mt-4"><button onclick="placeOrder('${id}', ${qty}, '${size}')" class="btn btn-p flex-1">${t('placeOrder')}</button><button onclick="hideM()" class="btn btn-s flex-1">${t('cancel')}</button></div></div></div>`);updateCheckoutTotal();}
function toggleDelFields(){var isDelivery=document.querySelector('input[name="delOpt"]:checked').value==='delivery';var addrField=document.getElementById('addrField');var branchField=document.getElementById('branchField');if(isDelivery){if(addrField) addrField.classList.remove('hidden');if(branchField) branchField.classList.add('hidden');}else{if(addrField) addrField.classList.add('hidden');if(branchField) branchField.classList.remove('hidden');}updateCheckoutTotal();} function togglePayMethod(){var payMethod=document.querySelector('input[name="payOpt"]:checked').value;var depositMsg=document.getElementById('depositMsg');var instaPayField=document.getElementById('instaPayField');if(payMethod==='cash'){if(depositMsg) depositMsg.classList.remove('hidden');if(instaPayField) instaPayField.classList.add('hidden');} else {if(depositMsg) depositMsg.classList.add('hidden');if(instaPayField) instaPayField.classList.remove('hidden');}}
function updateCheckoutTotal(){var prodTotalEl=document.getElementById('coProdTotal');var delTotalEl=document.getElementById('coDelTotal');var grandTotalEl=document.getElementById('coGrandTotal');if(!prodTotalEl||!delTotalEl||!grandTotalEl) return;var prodTotal=parseFloat(prodTotalEl.getAttribute('data-price'))||0;if(!prodTotal){prodTotal=parseFloat(prodTotalEl.textContent.replace(/[^0-9.]/g,''))||0;}var delTotal=0;var delOpt=document.querySelector('input[name="delOpt"]:checked');if(delOpt && delOpt.value==='delivery'){var areaSelect=document.getElementById('coArea');if(areaSelect && areaSelect.value){var area=D.storeSettings.deliveryAreas.find(a=>a.name===areaSelect.value);delTotal=area?parseFloat(area.fee)||0:0;}} else {delTotal = 0;}delTotalEl.textContent=delTotal+' '+t('curr');grandTotalEl.textContent=(prodTotal+delTotal)+' '+t('curr');}
async function placeOrder(id, qty, size){var p=D.storeProducts.find(x=>x.id===id);var name=document.getElementById('coName').value;var phone=document.getElementById('coPhone').value;var isDelivery=document.querySelector('input[name="delOpt"]:checked').value==='delivery';var area=document.getElementById('coArea')?document.getElementById('coArea').value:'';var addrDetails=document.getElementById('coAddrDetails')?document.getElementById('coAddrDetails').value:'';var branch=document.getElementById('coBranch')?document.getElementById('coBranch').value:'';var payMethod=document.querySelector('input[name="payOpt"]:checked').value;qty=parseInt(qty)||1;var receiptFile=document.getElementById('coReceipt').files[0];if(!name||!phone){toast("Name and Phone are required",false);return;}if(isDelivery&&!area){toast("Select delivery area",false);return;}if(!isDelivery&&!branch){toast("Select a branch",false);return;}if(!receiptFile){toast("Receipt upload is required",false);return;}if(qty>p.quantity){toast("Not enough quantity",false);return;}document.getElementById('loadingScreen').classList.remove('hidden');try{var receiptUrl=await uploadToCloudinary(receiptFile);p.quantity-=qty;var order={id:'o'+Date.now(),pid:id,name:name,phone:phone,isDelivery:isDelivery,area:area,addressDetails:addrDetails,branch:branch,payMethod:payMethod,qty:qty,size:size,receiptUrl:receiptUrl,date:new Date().toISOString()};D.storeOrders.push(order);await sv();hideM();toast(t('orderSuccess'),true);if(CU.role==='guest'||CU.role==='parent')nav('store');}catch(e){toast(t('saveErr'),false);}document.getElementById('loadingScreen').classList.add('hidden');}
function showAddProduct(id){var p=id?D.storeProducts.find(x=>x.id===id):null;showM(`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${p?t('editP'):t('addProduct')}</h2><div class="space-y-2"><div>${lbl('prodName')}<input id="pName" class="inp" value="${p?p.name:''}"></div><div>${lbl('prodDesc')}<textarea id="pDesc" class="inp h-20" value="${p?p.desc:''}">${p?p.desc:''}</textarea></div><div class="grid grid-cols-2 gap-2"><div>${lbl('price')}<input id="pPrice" type="number" class="inp" value="${p?p.price:0}"></div><div>${lbl('depositAmount')}<input id="pDeposit" type="number" class="inp" value="${p?p.depositAmount:0}"></div></div><div>${lbl('quantity')}<input id="pQty" type="number" class="inp" value="${p?p.quantity:0}"></div><div>${lbl('sizes')}<input id="pSizes" class="inp" placeholder="S, M, L" value="${p?(p.sizes||[]).join(', '):''}"></div><div>${lbl('images')}<input id="pImages" type="file" accept="image/*" multiple class="inp"></div><div class="flex gap-2 mt-3"><button onclick="saveProduct('${id||''}')" class="btn btn-p flex-1">${t('save')}</button><button onclick="hideM()" class="btn btn-s flex-1">${t('cancel')}</button></div></div></div>`);}
async function saveProduct(id){var name=document.getElementById('pName').value;var desc=document.getElementById('pDesc').value;var price=parseFloat(document.getElementById('pPrice').value)||0;var deposit=parseFloat(document.getElementById('pDeposit').value)||0;var qty=parseInt(document.getElementById('pQty').value)||0;var sizesStr=document.getElementById('pSizes').value;var sizes=sizesStr?sizesStr.split(',').map(s=>s.trim()).filter(s=>s):[];var files=document.getElementById('pImages').files;var images=[];var isNew = !id ? true : false;if(id){var p=D.storeProducts.find(x=>x.id===id);if(p){p.name=name;p.desc=desc;p.price=price;p.depositAmount=deposit;p.quantity=qty;p.sizes=sizes;images=p.images||[];} else {isNew = true;id = 'prod'+Date.now();}} else {id='prod'+Date.now();}if(files.length>0){document.getElementById('loadingScreen').classList.remove('hidden');for(var i=0;i<files.length;i++){try{var url=await uploadToCloudinary(files[i]);images.push(url);}catch(e){toast(t('saveErr'),false);document.getElementById('loadingScreen').classList.add('hidden');return;}}}if(isNew){D.storeProducts.push({id,name,desc,price,depositAmount:deposit,quantity:qty,sizes,images});}await sv();toast(t('upOk'));hideM();nav('store');document.getElementById('loadingScreen').classList.add('hidden');}
async function deleteProduct(id){if(confirm(t('del')+'?')){D.storeProducts=D.storeProducts.filter(p=>p.id!==id);await sv();nav('store');}} async function toggleStoreStatus(){D.storeOpen=!D.storeOpen;await sv();nav('store');}
function showBranches(){var h=`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${t('manageBranches')}</h2><div id="branchList" class="space-y-2 mb-3">`;D.storeSettings.branches.forEach((b,i)=>{h+=`<div class="flex gap-2"><input class="inp" value="${b}" onchange="updateBranch(${i},this.value)"><button onclick="delBranch(${i})" class="btn btn-d text-xs">X</button></div>`;});h+=`</div><button onclick="addBranch()" class="btn btn-s text-xs w-full mb-3">+ ${t('addBranch')}</button><button onclick="hideM()" class="btn btn-p w-full">${t('close')}</button></div>`;showM(h);} function addBranch(){D.storeSettings.branches.push('New Branch');sv();showBranches();} function updateBranch(i,val){D.storeSettings.branches[i]=val;sv();} function delBranch(i){D.storeSettings.branches.splice(i,1);sv();showBranches();}
function showDeliveryAreas(){var h=`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${t('manageDelivery')}</h2><div id="areaList" class="space-y-2 mb-3">`;D.storeSettings.deliveryAreas.forEach((a,i)=>{h+=`<div class="flex gap-2"><input class="inp" placeholder="${t('areaName')}" value="${a.name}" onchange="updateArea(${i},'name',this.value)"><input class="inp w-24" type="number" placeholder="${t('areaFee')}" value="${a.fee}" onchange="updateArea(${i},'fee',this.value)"><button onclick="delArea(${i})" class="btn btn-d text-xs">X</button></div>`;});h+=`</div><button onclick="addArea()" class="btn btn-s text-xs w-full mb-3">+ ${t('manageDelivery')}</button><button onclick="hideM()" class="btn btn-p w-full">${t('close')}</button></div>`;showM(h);} function addArea(){D.storeSettings.deliveryAreas.push({name:'',fee:0});sv();showDeliveryAreas();} function updateArea(i,field,val){D.storeSettings.deliveryAreas[i][field]=val;sv();} function delArea(i){D.storeSettings.deliveryAreas.splice(i,1);sv();showDeliveryAreas();}
function showStoreOrders(){var h=`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-4">${t('storeOrders')}</h2><div class="space-y-3 max-h-[70vh] overflow-y-auto">`;if(D.storeOrders.length === 0){h += `<p class="text-gray-500 text-center py-5">لا توجد طلبات حالية</p>`;} else {D.storeOrders.slice().reverse().forEach(o=>{var p=D.storeProducts.find(x=>x.id===o.pid);var productTotal = p ? p.price*o.qty : 0;var delTotal = o.isDelivery ? (D.storeSettings.deliveryAreas.find(a=>a.name===o.area)?.fee || 0) : 0;var grandTotal = productTotal + delTotal;h+=`<div class="bg-dk-h p-4 rounded-xl border border-pv/10 text-xs space-y-2 relative"><button onclick="delStoreOrder('${o.id}')" class="absolute top-3 left-3 text-red-400 hover:text-red-300 bg-red-500/10 p-1.5 rounded"><i class="fas fa-trash"></i></button><div class="flex items-start gap-3 mb-2 pr-8">${p && p.images && p.images[0] ? `<img src="${p.images[0]}" class="w-12 h-12 rounded-lg object-cover">` : ''}<div class="flex-1"><p class="font-bold text-pv-l text-sm">${p?p.name:'منتج محذوف'}</p><p class="text-gray-400">الكمية: ${o.qty} ${o.size ? `(مقاس: ${o.size})` : ''}</p></div></div><hr class="border-gray-700/50"><div class="grid grid-cols-2 gap-2 text-[11px]"><div><span class="text-gray-500">الإسم:</span> ${o.name}</div><div><span class="text-gray-500">الهاتف:</span> <a href="tel:${o.phone}" class="text-blue-400">${o.phone}</a></div><div><span class="text-gray-500">طريقة الدفع:</span> ${o.payMethod}</div><div><span class="text-gray-500">التاريخ:</span> ${new Date(o.date).toLocaleDateString()}</div></div><hr class="border-gray-700/50">`;if(o.isDelivery){h+=`<div class="bg-dk-c p-2.5 rounded-lg text-[11px] space-y-1"><p class="text-green-400 font-bold flex items-center gap-1"><i class="fas fa-truck"></i> توصيل</p><p><span class="text-gray-500">المنطقة:</span> ${o.area}</p><p><span class="text-gray-500">العنوان بالتفصيل:</span> ${o.addressDetails || 'غير محدد'}</p><p><span class="text-gray-500">سعر التوصيل:</span> ${delTotal} ${t('curr')}</p></div>`;} else {h+=`<div class="bg-dk-c p-2.5 rounded-lg text-[11px]"><p class="text-yellow-400 font-bold flex items-center gap-1"><i class="fas fa-store"></i> استلام من الفرع</p><p class="mt-1"><span class="text-gray-500">الفرع:</span> ${o.branch || 'غير محدد'}</p></div>`;}h+=`<hr class="border-gray-700/50"><div class="flex justify-between items-center pt-1"><a href="${o.receiptUrl||'#'}" target="_blank" class="text-pv-l hover:underline flex items-center gap-1"><i class="fas fa-receipt"></i> عرض الإيصال</a><span class="font-bold text-pv-l text-sm">الإجمالي: ${grandTotal} ${t('curr')}</span></div></div>`;});}h+=`</div><button onclick="hideM()" class="btn btn-p w-full mt-4">${t('close')}</button></div>`;showM(h);}
async function delStoreOrder(id){if(confirm('هل تريد حذف هذا الطلب نهائياً؟')){D.storeOrders = D.storeOrders.filter(o => o.id !== id);await sv();showStoreOrders(); toast('تم حذف الطلب بنجاح', true);}}

function vCoaches(){var h=`<div class="fade-in space-y-4"><div class="flex justify-between items-center"><h3 class="fd text-pv-l">${t('mCoaches')}</h3><button onclick="showAddCoach()" class="btn btn-p text-xs"><i class="fas fa-plus mr-1"></i>${t('addC')}</button></div>`;D.coaches.forEach(c=>{var teamsStr=(c.teams&&c.teams.includes('all'))?'All Teams':(c.teams||[]).join(', ');var genderStr=c.gender==='all'?'Both':(c.gender==='boys'?'Boys':'Girls');h+=`<div class="bg-dk-c p-3 rounded-lg border border-pv/10 flex justify-between items-center flex-wrap gap-2"><div><p class="font-bold">${c.name} <span class="text-xs text-gray-500">(${t(c.role==='coach'?'coa':c.role==='manager'?'mgr':'assistant')})</span></p><p class="text-xs text-gray-400">${teamsStr} | ${genderStr}</p></div><div class="flex gap-2"><button onclick="showEditCoach('${c.id}')" class="btn btn-s text-xs">${t('editUser')}</button>${c.role==='assistant'?`<button onclick="showManageAccess('${c.id}')" class="btn btn-s text-xs">${t('manageAccess')}</button>`:''}<button onclick="delCoach('${c.id}')" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button></div></div>`;});return h+'</div>';}
function showAddCoach(){showM(`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${t('addC')}</h2><div class="space-y-2"><div>${lbl('cNm')}<input id="cNm" class="inp"></div><div>${lbl('un')}<input id="cEm" class="inp"></div><div>${lbl('pw')}<input id="cPass" type="password" class="inp"></div><div>${lbl('role')}<select id="cRole" class="inp"><option value="coach">${t('coa')}</option><option value="assistant">${t('assistant')}</option><option value="manager">${t('mgr')}</option></select></div><div>${lbl('gender')}<select id="cGender" class="inp"><option value="all">${t('bothG')}</option><option value="boys">${t('boys')}</option><option value="girls">${t('girls')}</option></select></div><div id="cTeamsDiv">${lbl('teams')}<select id="cTeams" class="inp" multiple size="4"><option value="all">All Teams</option>${D.teams.map(t=>`<option value="${t}">${t}</option>`).join('')}</select><p class="text-[10px] text-gray-500 mt-1">Hold Ctrl/Cmd to select multiple teams.</p></div></div><div class="flex gap-2 mt-3"><button onclick="addCoach()" class="btn btn-p flex-1">${t('save')}</button><button onclick="hideM()" class="btn btn-s flex-1">${t('cancel')}</button></div></div></div>`);}
async function addCoach(){var nm=document.getElementById('cNm').value;var em=document.getElementById('cEm').value;var pass=document.getElementById('cPass').value;var role=document.getElementById('cRole').value;var gender=document.getElementById('cGender').value;var cTeamsSel=Array.from(document.getElementById('cTeams').selectedOptions).map(o=>o.value);var cTeams=cTeamsSel.includes('all')||cTeamsSel.length===0?['all']:cTeamsSel;if(!nm||!em||!pass){toast(t('logFail'),false);return;}document.getElementById('loadingScreen').classList.remove('hidden');try{var userCred=await secondaryAuth.createUserWithEmailAndPassword(em,pass);await userCred.user.sendEmailVerification();await secondaryAuth.signOut();D.coaches.push({id:'c'+Date.now(),name:nm,email:em,teams:cTeams,gender:gender,role:role,uid:userCred.user.uid});await sv();toast(t('cAdd'));hideM();nav('mCoaches');}catch(e){toast(e.message,false);}document.getElementById('loadingScreen').classList.add('hidden');}
function showEditCoach(id){var c=D.coaches.find(x=>x.id===id);if(!c)return;var teams=c.teams||['all'];showM(`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${t('editUser')} - ${c.name}</h2><div class="space-y-2"><div>${lbl('cNm')}<input id="ecNm" class="inp" value="${c.name}"></div><div>${lbl('un')}<input id="ecEm" class="inp" value="${c.email}"></div><div>${lbl('role')}<select id="ecRole" class="inp"><option value="coach" ${c.role==='coach'?'selected':''}>${t('coa')}</option><option value="assistant" ${c.role==='assistant'?'selected':''}>${t('assistant')}</option><option value="manager" ${c.role==='manager'?'selected':''}>${t('mgr')}</option></select></div><div>${lbl('gender')}<select id="ecGender" class="inp"><option value="all" ${c.gender==='all'?'selected':''}>${t('bothG')}</option><option value="boys" ${c.gender==='boys'?'selected':''}>${t('boys')}</option><option value="girls" ${c.gender==='girls'?'selected':''}>${t('girls')}</option></select></div><div>${lbl('teams')}<select id="ecTeams" class="inp" multiple size="4"><option value="all" ${teams.includes('all')?'selected':''}>All Teams</option>${D.teams.map(t=>`<option value="${t}" ${teams.includes(t)?'selected':''}>${t}</option>`).join('')}</select></div></div><div class="flex gap-2 mt-3"><button onclick="saveEditCoach('${id}')" class="btn btn-p flex-1">${t('save')}</button><button onclick="hideM()" class="btn btn-s flex-1">${t('cancel')}</button></div></div></div>`);}
async function saveEditCoach(id){var c=D.coaches.find(x=>x.id===id);c.name=document.getElementById('ecNm').value;c.email=document.getElementById('ecEm').value;c.role=document.getElementById('ecRole').value;c.gender=document.getElementById('ecGender').value;var cTeamsSel=Array.from(document.getElementById('ecTeams').selectedOptions).map(o=>o.value);c.teams=cTeamsSel.includes('all')||cTeamsSel.length===0?['all']:cTeamsSel;await sv();toast(t('upOk'));hideM();nav('mCoaches');}
async function delCoach(id){if(confirm(t('del')+'?')){D.coaches=D.coaches.filter(c=>c.id!==id);await sv();nav('mCoaches');}}
function showManageAccess(id){var c=D.coaches.find(x=>x.id===id);if(!c)return;var items=[{k:'dash',l:'Dashboard'},{k:'players',l:'Players'},{k:'att',l:'Attendance'},{k:'teamStats',l:'Team Stats'},{k:'matchBoard',l:'Match Board'},{k:'statsInput',l:'Stats Input'},{k:'lead',l:'Leaderboard'},{k:'totm',l:'TOTM'},{k:'pom',l:'Player of the Month'},{k:'exercises',l:'Exercises'},{k:'about',l:'About'}];var h=`<div class="p-5"><h2 class="fd text-lg text-pv-l mb-3">${t('manageAccess')} - ${c.name}</h2><div class="grid grid-cols-2 gap-2">`;items.forEach(it=>{var checked=D.assistantAccess[it.k]?'checked':'';h+=`<label class="flex items-center gap-2 text-sm bg-dk-h p-2 rounded cursor-pointer"><input type="checkbox" id="acc_${it.k}" ${checked}> ${it.l}</label>`;});h+=`</div><button onclick="saveAccess()" class="btn btn-p w-full mt-3">${t('save')}</button></div>`;showM(h);}
async function saveAccess(){['dash','players','att','teamStats','matchBoard','statsInput','lead','totm','pom','exercises','about'].forEach(k=>{var el=document.getElementById('acc_'+k);if(el)D.assistantAccess[k]=el.checked;});await sv();toast(t('upOk'));hideM();}
window.onload=function(){ld();var sb=document.getElementById('sidebar');if(sb && !document.getElementById('mobileSidebarClose')){var btn=document.createElement('div');btn.id='mobileSidebarClose';btn.innerHTML='<i class="fas fa-times"></i>';btn.onclick=function(){document.getElementById('sidebar').classList.remove('show');};sb.appendChild(btn);}};
</script>
